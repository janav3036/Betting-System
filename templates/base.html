<!DOCTYPE html>
<html>

<head>
    <title>Class Prediction Market</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        .navbar {
            background: #222;
            color: white;
            padding: 15px;
        }

        .container {
            padding: 15px;
        }

        .event-card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
        }

        button {
            padding: 8px 15px;
            margin-right: 10px;
            cursor: pointer;
        }

        .probability-bar {
            display: flex;
            height: 25px;
            width: 100%;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }

        .yes-bar {
            background: #4CAF50;
            color: white;
            text-align: center;
            font-size: 12px;
        }

        .no-bar {
            background: #f44336;
            color: white;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div style="display: flex; justify-content: space-between; align-items: center;">

            College Prediction Market
            {%if current_user%}
            <div>
                <a href="{{ url_for('betting.dashboard') }}">Dashboard</a> |

                <a href="{{ url_for('betting.leaderboard') }}">Leaderboard</a> |

                {%if current_user.is_admin%}
                <a href="{{url_for('admin.create_event')}}" style="color: white;">Create an Event</a> |
                {%else%}
                Coins: {{current_user.coins}} |
                {%endif%}
                Logged in as: {{current_user.username}} |
                <a href="{{url_for('auth.logout')}}" style="color: white;">Logout</a>

            </div>
            {%endif%}
        </div>
    </div>


    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
