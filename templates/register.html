{% extends 'base.html' %}
{% block content %}
<h2>Register</h2>
<div class='event-card'>
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label><strong>Username</strong></label>
            <input type="text" name="username" placeholder="Enter username" required style="width: 300px; padding: 6px;">

        </div>

        <div style="margin-bottom:15px;">
            <label><strong>Password</strong></label><br>
            <input type="password" name="password" placeholder="Create a password" required style="width:300px; padding:6px;">
        </div>
        <button type="submit">Register</button>

    </form>
    <div style="margin-top: 15px;">
        Already have an account? 
        <a href="{{url_for('auth.login')}}">Login</a>
    </div>
</div>
{% endblock %}
