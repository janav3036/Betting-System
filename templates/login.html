{% extends 'base.html' %}
{% block content %}

<h2>Login</h2>
<div class="event-card">
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label><strong>Username</strong></label>
            <input type="text" name="username" placeholder="Enter username" required style="width: 300px; padding: 6px;">

        </div>
        <div style="margin-bottom: 15px;">
            <label><strong>Password</strong></label>
            <input type="text" name="password" placeholder="Enter password" required style="width: 300px; padding: 6px;">

        </div>    
        <button type="submit">Login</button>  
    </form>
    <div style="margin-top: 15px;">
        Don't have an account? 
        <a href="{{url_for('auth.register')}}">Register</a>
    </div>
</div>

{% endblock %}
